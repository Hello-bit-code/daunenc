<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 물량/작업 보고</title>

  <style>
    :root{
      --bg:#0b1020;
      --surface: rgba(17, 24, 39, .86);
      --surface2: rgba(15, 23, 42, .72);
      --line: rgba(51, 65, 85, .62);
      --text:#e5e7eb;
      --muted: rgba(148, 163, 184, .92);
      --danger:#fb7185;
      --shadow: 0 20px 48px rgba(0,0,0,.42);
      --radius: 18px;
      --radius2: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
              "Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic", sans-serif;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      letter-spacing: -0.2px;
      background:
        radial-gradient(1200px 780px at 20% 10%, rgba(96,165,250,.18), transparent 55%),
        radial-gradient(900px 560px at 90% 20%, rgba(52,211,153,.12), transparent 55%),
        radial-gradient(900px 560px at 40% 95%, rgba(251,113,133,.10), transparent 60%),
        var(--bg);
    }
    .wrap{ max-width: 1120px; margin: 22px auto 80px; padding: 0 18px; }

    .topbar{ display:flex; gap:14px; align-items:flex-start; justify-content: space-between; margin-bottom: 14px; }
    .brand{ display:flex; gap:12px; align-items:center; }
    .logo{
      width:44px; height:44px; border-radius:16px;
      background: linear-gradient(135deg, rgba(96,165,250,.95), rgba(52,211,153,.86));
      box-shadow: 0 14px 34px rgba(96,165,250,.22);
      position: relative; flex:0 0 auto;
    }
    .logo:after{
      content:""; position:absolute; inset:10px; border-radius:12px;
      background: rgba(17,24,39,.86);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .title h1{ margin:0; font-size:18px; line-height:1.15; }
    .title .sub{ margin-top:5px; font-size:12.5px; color: var(--muted); line-height:1.35; white-space:pre-line; }

    .card{
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .card + .card{ margin-top:14px; }

    .cardHead{ display:flex; gap:12px; align-items:center; justify-content: space-between; margin-bottom:12px; }
    .cardHead .left{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .cardHead h2{ margin:0; font-size:14.5px; }

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding: 7px 10px; border-radius: 999px;
      border: 1px solid var(--line); background: rgba(11, 15, 26, .35);
      font-size: 12px; color: var(--muted); user-select:none; white-space:nowrap;
    }
    .pill strong{ color: var(--text); font-weight:700; }

    .grid{ display:grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
    .field label{ display:block; margin: 0 0 6px; font-size:12px; color: var(--muted); }
    input, select, textarea{
      width:100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(51,65,85,.85);
      background: rgba(11,15,26,.48);
      color: var(--text);
      outline:none;
      transition: border .15s ease, background .15s ease;
      font-size:14px;
    }
    input:focus, select:focus, textarea:focus{
      border-color: rgba(96,165,250,.85);
      background: rgba(11,15,26,.62);
    }
    input::placeholder{ color: rgba(148,163,184,.62); }

    textarea{
      min-height: 190px;
      resize: vertical;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.5;
      white-space: pre;
    }

    .hint{ font-size:12px; color: var(--muted); line-height:1.45; }
    .hr{ height:1px; background: rgba(51,65,85,.75); margin: 14px 0; }

    .btn{
      border: 1px solid rgba(51,65,85,.85);
      background: rgba(11,15,26,.50);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-size:13px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      white-space:nowrap;
      transition: border .15s ease, background .15s ease, transform .05s ease;
      touch-action: manipulation;
    }
    .btn:hover{ border-color: rgba(96,165,250,.55); background: rgba(11,15,26,.72); }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      border-color: transparent;
      background: linear-gradient(135deg, rgba(96,165,250,.98), rgba(52,211,153,.86));
      color:#07101d;
      font-weight: 800;
    }
    .btn.danger{ border-color: rgba(251,113,133,.55); }
    .btn.small{ padding: 8px 10px; border-radius: 10px; font-size: 12.5px; }
    .btn.ghost{
      background: transparent;
      border-color: rgba(51,65,85,.55);
    }
    .btn.ghost:hover{
      border-color: rgba(96,165,250,.45);
      background: rgba(11,15,26,.30);
    }

    .bar{ display:flex; gap:10px; flex-wrap: wrap; justify-content: space-between; align-items:center; }
    .barRight{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end; }

    .works{ display:flex; flex-direction: column; gap: 12px; }
    .work{
      border: 1px solid rgba(51,65,85,.75);
      border-radius: var(--radius);
      background: rgba(11,15,26,.30);
      padding: 12px;
      backdrop-filter: blur(8px);
    }
    .workHead{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .workHead .left{ display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
    .workTitle{ font-size: 13.5px; font-weight: 900; }
    .tag{
      font-size: 12px;
      color: var(--muted);
      border: 1px solid rgba(51,65,85,.65);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(17,24,39,.42);
    }

    .groups{ display:flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .group{
      border: 1px solid rgba(51,65,85,.70);
      border-radius: var(--radius2);
      background: rgba(11,15,26,.28);
      padding: 12px;
      backdrop-filter: blur(8px);
    }
    .groupHead{
      display:flex; align-items:center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .groupHead .left{ display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
    .groupTitle{ font-size: 13px; font-weight: 850; }

    .bulkWrap{ display:block; }
    .detailWrap{ display:none; margin-top: 10px; }
    .group.showDetail .detailWrap{ display:block; }

    .items{ display:flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .item{
      border: 1px solid rgba(51,65,85,.65);
      border-radius: var(--radius2);
      background: rgba(11,15,26,.34);
      padding: 10px;
      backdrop-filter: blur(8px);
    }
    .itemGrid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      align-items: end;
    }

    .chips{ display:none; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .item.showMeta .chips{ display:flex; }
    .chip{
      font-size: 12px; padding: 6px 10px; border-radius: 999px;
      border: 1px solid rgba(51,65,85,.70);
      background: rgba(17,24,39,.62);
      color: var(--muted);
    }
    .chip b{ color: var(--text); }

    /* ✅ 빠른입력 미리보기 */
    .bulkPreview{ display:none; margin-top: 10px; }
    .group.showPreview .bulkPreview{ display:block; }
    .previewCard{
      border: 1px solid rgba(51,65,85,.65);
      border-radius: var(--radius2);
      background: rgba(11,15,26,.30);
      padding: 10px;
    }
    .previewTop{
      display:flex; align-items:center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .previewTop .left{
      display:flex; align-items:center; gap: 8px; flex-wrap: wrap;
      font-size: 12.5px;
      color: var(--muted);
    }
    .kbadge{
      display:inline-flex;
      border: 1px solid rgba(51,65,85,.55);
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(17,24,39,.35);
      color: var(--muted);
      font-size: 12px;
    }

    .bulkTA{ min-height: 110px; font-family: var(--mono); font-size: 12.5px; line-height: 1.45; white-space: pre; }

    .toast{
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      background: rgba(17,24,39,.92);
      border: 1px solid rgba(51,65,85,.85);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      display:none;
      font-size: 13px;
      max-width: min(720px, calc(100% - 24px));
      z-index: 9999;
    }

    .watermark{
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 10px;
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index: 1;
      opacity: .55;
    }
    .watermark .wmCard{
      pointer-events:none;
      font-size: 11px;
      color: rgba(148,163,184,.9);
      border: 1px solid rgba(51,65,85,.55);
      background: rgba(11,15,26,.35);
      border-radius: 999px;
      padding: 7px 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      backdrop-filter: blur(6px);
      text-align:center;
      line-height: 1.25;
      white-space: pre-line;
    }

    /* ✅ 칸별 색(톤) */
    .tone-blue   input, .tone-blue   select { background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.35); }
    .tone-green  input, .tone-green  select { background: rgba(16,185,129,.11); border-color: rgba(16,185,129,.32); }
    .tone-amber  input, .tone-amber  select { background: rgba(245,158,11,.11); border-color: rgba(245,158,11,.30); }
    .tone-rose   input, .tone-rose   select { background: rgba(244,63,94,.10);  border-color: rgba(244,63,94,.30); }
    .tone-violet input, .tone-violet select { background: rgba(139,92,246,.11); border-color: rgba(139,92,246,.32); }
    .tone-cyan   input, .tone-cyan   select { background: rgba(6,182,212,.11);  border-color: rgba(6,182,212,.32); }
    .tone-slate  input, .tone-slate  select { background: rgba(148,163,184,.08); border-color: rgba(148,163,184,.25); }

    .tone-blue   input:focus, .tone-blue select:focus,
    .tone-green  input:focus, .tone-green select:focus,
    .tone-amber  input:focus, .tone-amber select:focus,
    .tone-rose   input:focus, .tone-rose select:focus,
    .tone-violet input:focus, .tone-violet select:focus,
    .tone-cyan   input:focus, .tone-cyan select:focus,
    .tone-slate  input:focus, .tone-slate select:focus{
      border-color: rgba(96,165,250,.85);
      background: rgba(11,15,26,.62);
    }

    @media (max-width: 820px){
      .wrap{ padding: 0 14px; }
      .topbar{ flex-direction: column; align-items:flex-start; }

      input, select, textarea{ font-size:16px; padding: 12px 12px; border-radius: 14px; }
      .btn{ padding: 12px 13px; font-size:14px; border-radius: 14px; }
      .btn.small{ padding: 10px 12px; font-size:13px; border-radius: 12px; }

      .grid{ grid-template-columns: 1fr 1fr; }
      .span12,.span6{ grid-column: 1 / -1 !important; }
      .span3{ grid-column: span 1 !important; }

      .itemGrid{ grid-template-columns: 1fr 1fr; }
      .full{ grid-column: 1 / -1 !important; }
      .half{ grid-column: span 1 !important; }
      .btnBar{ grid-column: 1 / -1 !important; justify-content:flex-end; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div class="title">
        <h1>오프라인 물량/작업 보고</h1>
        <div class="sub">서버 없이 사용 · 기기(LocalStorage) 저장
빠른입력(기본): 한 줄 = 자재 1건 / 같은 자재 반복이면 자재명 생략 가능</div>
      </div>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn danger" id="btnReset">초기화</button>
    </div>
  </div>

  <section class="card">
    <div class="cardHead">
      <div class="left">
        <h2>작업(기본 정보)</h2>
        <span class="pill"><strong id="countWorks">0</strong> 작업</span>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="btnAddWork">작업 추가</button>
        <button class="btn" id="btnSaveAll">저장</button>
      </div>
    </div>

    <div class="hint" style="margin-bottom:10px;">
      ✅ 구역은 <b>빠른입력 → 미리보기 수정 → 확정</b> 흐름이 기본입니다. (실수 방지)<br/>
      ✅ 필요하면 <b>상세 입력</b>을 열어 개별 카드로도 수정할 수 있습니다.
    </div>

    <div class="works" id="works"></div>
  </section>

  <section class="card">
    <div class="cardHead">
      <div class="left">
        <h2>금일 작업 결과(카톡용)</h2>
        <span class="pill">전체 작업 출력</span>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="btnCopy">내용 복사</button>
      </div>
    </div>

    <textarea id="output" readonly placeholder="‘전체 작업 결과 생성’을 누르면 모든 작업이 한 번에 작성됩니다."></textarea>

    <div class="hr"></div>

    <div class="bar">
      <div class="hint">복사 후 카톡에 붙여넣기 하세요.</div>
      <div class="barRight">
        <button class="btn primary" id="btnGenerateAll">전체 작업 결과 생성</button>
      </div>
    </div>
  </section>
</div>

<div class="watermark" aria-hidden="true">
  <div class="wmCard">제작 : 황정운
수정요청 : 010-5031-9447</div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const UNIT_OPTIONS = ["EA","본","m","mm","SET","POINT","ROLL","PCS"];
  const CATEGORY_OPTIONS = ["TRAY","CONDUIT","ELP","SUPPORT","U-CHANNEL","C-CHANNEL","ANGLE","FITTING","BOX","FASTENER","PAINT","OTHER"];
  const DEFAULT_AREAS = ["PIPE RACK","전기실 1층","전기실 2층","SUBSTATION","UG","TK AREA","에틸렌 B구역"];

  const MATERIAL_DICT = [
    { aliases:["전선관","스틸 전선관","STEEL CONDUIT","STEEL CONDUIT PIPE","CONDUIT","CONDUIT PIPE"], canonical:"STEEL CONDUIT", category:"CONDUIT"},
    { aliases:["CD","CD관","CD PIPE","CD CONDUIT"], canonical:"CD CONDUIT", category:"CONDUIT"},
    { aliases:["후렉시블","후렉쉬블","FLEX","FLEXIBLE","FLEXIBLE CONDUIT"], canonical:"FLEXIBLE CONDUIT", category:"CONDUIT"},
    { aliases:["ELP","ELP 배관","ELP PIPE"], canonical:"ELP", category:"ELP"},
    { aliases:["트레이","케이블트레이","CABLE TRAY","TRAY","CABLETRAY"], canonical:"CABLE TRAY", category:"TRAY"},
    { aliases:["서포트","SUPPORT","LIGHTING SUPPORT","TRAY SUPPORT"], canonical:"SUPPORT", category:"SUPPORT"},
    { aliases:["앵글","ANGLE"], canonical:"ANGLE", category:"ANGLE"},
    { aliases:["유니온","UNION"], canonical:"UNION", category:"FITTING"},
    { aliases:["레듀샤","REDUCER","REDUCER LEFT","REDUCER RIGHT"], canonical:"REDUCER", category:"FITTING"},
    { aliases:["클램프","CLAMP"], canonical:"CLAMP", category:"FASTENER"},
    { aliases:["라운드박스","ROUND BOX"], canonical:"ROUND BOX", category:"BOX"},
    { aliases:["풀박스","PULL BOX","FULL BOX"], canonical:"PULL BOX", category:"BOX"},
    { aliases:["도장","페인트","PAINT","COATING"], canonical:"PAINT", category:"PAINT"},
    { aliases:["U찬넬","U 찬넬","U-CHANNEL","U CHANNEL","UNISTRUT","유니스트럿","STRUT CHANNEL"], canonical:"U-CHANNEL", category:"U-CHANNEL"},
    { aliases:["C찬넬","C 찬넬","C-CHANNEL","C CHANNEL","찬넬","채널","CHANNEL"], canonical:"C-CHANNEL", category:"C-CHANNEL"},
  ];

  const $ = (sel) => document.querySelector(sel);

  function toast(msg){
    const t = $("#toast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(toast._timer);
    toast._timer = setTimeout(()=> t.style.display = "none", 2200);
  }

  function todayISO(){
    const d = new Date();
    const tz = d.getTimezoneOffset() * 60000;
    return new Date(d.getTime() - tz).toISOString().slice(0,10);
  }

  function todayISOWithKoreanDay(){
    const d = new Date();
    const days = ["일","월","화","수","목","금","토"];
    return `${todayISO()} ${days[d.getDay()]}`;
  }

  function normalizeText(s){
    return (s||"").trim().replace(/\s+/g, " ").toUpperCase();
  }

  function esc(s){
    return String(s||"")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function isConduitCodeOnly(raw){
    return /^\d+(?:\.\d+)?\s*C$/i.test((raw||"").trim());
  }

  function mapMaterial(input){
    const raw = (input||"").trim();
    if(!raw) return { canonical:"", category:"", confidence:"" };

    if(isConduitCodeOnly(raw)){
      return { canonical:"", category:"", confidence:"규격(코드)" };
    }

    const up = normalizeText(raw);
    const compact = up.replace(/[\s\-_/]/g, "");

    for(const entry of MATERIAL_DICT){
      for(const a of entry.aliases){
        const au = normalizeText(a);
        if(up === au) return { canonical: entry.canonical, category: entry.category, confidence:"정확" };
      }
    }
    for(const entry of MATERIAL_DICT){
      for(const a of entry.aliases){
        const au = normalizeText(a);
        if(au && up.includes(au)) return { canonical: entry.canonical, category: entry.category, confidence:"포함" };
      }
    }
    for(const entry of MATERIAL_DICT){
      for(const a of entry.aliases){
        const au = normalizeText(a).replace(/[\s\-_/]/g, "");
        if(au && compact.includes(au)) return { canonical: entry.canonical, category: entry.category, confidence:"유사" };
      }
    }
    return { canonical: raw.toUpperCase(), category:"OTHER", confidence:"원문" };
  }

  function parseSpec(spec){
    const s0 = (spec||"").trim();
    if(!s0) return { pretty:"" };
    const s = s0.replace(/,/g,"").replace(/\s+/g," ").trim();

    let m = s.match(/^(\d+(?:\.\d+)?)\s*[xX×\*]\s*(\d+(?:\.\d+)?)\s*(?:[xX×\*]\s*(\d+(?:\.\d+)?))?\s*$/);
    if(m){
      const parts = [m[1], m[2]].concat(m[3] ? [m[3]] : []);
      return { pretty: parts.join("×") };
    }

    m = s.match(/^(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)(?:\s+(\d+(?:\.\d+)?))?\s*$/);
    if(m){
      const parts = [m[1], m[2]].concat(m[3] ? [m[3]] : []);
      return { pretty: parts.join("×") };
    }

    return { pretty: s0 };
  }

  function qtyUnitForOutput(qty, unit){
    const q = (qty ?? "").toString().trim();
    const u0 = (unit ?? "").toString().trim();
    if(!q) return "";

    const n = Number(q);
    const isNum = !Number.isNaN(n);

    const u = u0.toLowerCase();

    if(u === "m"){
      if(!isNum) return `${q}${u0}`;
      return `${n * 1000}mm`;
    }
    if(u === "mm"){
      return isNum ? `${n}mm` : `${q}mm`;
    }
    if(u0 === "본"){
      return `${q}본`;
    }
    return u0 ? `${q}${u0}` : q;
  }

  function parseQtyUnitToken(token){
    const t = (token||"").trim();
    if(!t) return null;
    const m = t.match(/^(\d+(?:\.\d+)?)(EA|본|m|mm|MM|SET|POINT|ROLL|PCS)$/i);
    if(!m) return null;

    const qty = m[1];
    const u = m[2].toUpperCase();
    let unit = m[2];

    if(u === "M") unit = "m";
    else if(u === "MM") unit = "mm";
    else unit = m[2];

    return { qty, unit };
  }

  function parseBulkLine(line){
    const raw = (line||"").trim();
    if(!raw) return null;

    let note = "";
    let main = raw;
    const paren = raw.match(/\((.*?)\)\s*$/);
    if(paren){
      note = (paren[1]||"").replace(/^구간\s*:\s*/,"").trim();
      main = raw.slice(0, paren.index).trim();
    }

    let tokens = main.replace(/\t+/g," ").split(/\s+/).filter(Boolean);

    let qty = "";
    let unit = "EA";
    let qtyIdx = -1;

    for(let i=tokens.length-1; i>=0; i--){
      const q = parseQtyUnitToken(tokens[i]);
      if(q){
        qty = q.qty;
        unit = q.unit;
        qtyIdx = i;
        break;
      }
    }

    if(qtyIdx === -1){
      for(let i=tokens.length-2; i>=0; i--){
        const n = tokens[i];
        const u = tokens[i+1];
        if(/^\d+(?:\.\d+)?$/.test(n) && ["EA","본","m","mm","MM","SET","POINT","ROLL","PCS"].includes(u)){
          qty = n;
          unit = (u === "MM" ? "mm" : (u === "M" ? "m" : u));
          tokens.splice(i+1,1);
          tokens.splice(i,1);
          break;
        }
      }
    }else{
      tokens.splice(qtyIdx,1);
    }

    let spec = "";

    const idxMul = tokens.findIndex(t => /[xX×\*]/.test(t) && /\d/.test(t));
    if(idxMul >= 0){
      spec = tokens[idxMul];
      tokens.splice(idxMul,1);
    }else{
      for(let i=0; i<=tokens.length-2; i++){
        if(/^\d+(?:\.\d+)?$/.test(tokens[i]) && /^\d+(?:\.\d+)?$/.test(tokens[i+1])){
          const t3 = tokens[i+2];
          if(t3 && /^\d+(?:\.\d+)?$/.test(t3)){
            spec = `${tokens[i]} ${tokens[i+1]} ${t3}`;
            tokens.splice(i,3);
          }else{
            spec = `${tokens[i]} ${tokens[i+1]}`;
            tokens.splice(i,2);
          }
          break;
        }
      }
    }

    if(!spec){
      const idx = tokens.findIndex(t => /^\d+(?:\.\d+)?(C|MM)$/i.test(t));
      if(idx >= 0){
        spec = tokens[idx];
        tokens.splice(idx,1);
      }
    }

    if(!spec && tokens.length >= 2){
      const last = tokens[tokens.length - 1];
      const isSingleNumber = /^\d+(?:\.\d+)?$/.test(last);
      if(isSingleNumber){
        const candWith = tokens.join(" ").trim();
        const candWithout = tokens.slice(0, -1).join(" ").trim();

        const mWith = mapMaterial(candWith);
        const mWithout = mapMaterial(candWithout);

        const score = (c) => (c==="정확"?4 : c==="포함"?3 : c==="유사"?2 : c==="원문"?1 : 0);

        if(score(mWithout.confidence) > score(mWith.confidence)){
          spec = last;
          tokens = tokens.slice(0,-1);
        }
      }
    }

    const materialInput = tokens.join(" ").trim();
    return { materialInput, spec, qty, unit, note };
  }

  function pushUnique(arr, val, max=80){
    val = (val||"").trim();
    if(!val) return;
    const idx = arr.findIndex(v => normalizeText(v) === normalizeText(val));

    arr.unshift(val);
    if(arr.length > max) arr.length = max;
  }

  function generateOutputAllWorks(){
    const out = [];
    out.push(todayISOWithKoreanDay());
    out.push("[금일 작업내용]");
    out.push("");

    state.works.forEach((w, wi) => {
      if(wi > 0){
        out.push("");
        out.push("■ 추가 작업");
      }

      const drawing = (w.drawing || "").trim();
      out.push(`도면 : ${drawing}`);

      const baseArea = (w.area || "").trim();

      const groups = Array.isArray(w.groups) ? w.groups : [];
      groups.forEach((g, gi) => {
        const areaDetail = (g.areaDetail || "").trim();
        const areaLine = [baseArea, areaDetail].filter(Boolean).join(" ").trim();

        if(gi === 0){
          out.push(`공정지역 : ${areaLine}`);
        }else{
          out.push("");
          out.push("[추가 구역]");
          out.push(`공정지역 : ${areaLine}`);
        }

        let n = 1;
        const items = Array.isArray(g.items) ? g.items : [];
        items.forEach(it => {
          const mat = ((it.canonical || "").trim() || (it.materialInput || "").trim()).toUpperCase();
          const specPretty = parseSpec(it.spec).pretty;
          const qtyPart = qtyUnitForOutput(it.qty, it.unit);
          const note = (it.note || "").trim();

          if(!mat && !specPretty && !qtyPart && !note) return;

          const parts = [];
          parts.push(`${n})`);
          if(mat) parts.push(mat);
          if(specPretty) parts.push(specPretty);
          if(qtyPart) parts.push(qtyPart);
          if(note) parts.push(`(구간: ${note})`);

          out.push(parts.join(" ").replace(/\s+/g," ").trim());
          n++;
        });
      });
    });

    return out.join("\n").trim();
  }

  async function copyToClipboard(text){
    try{
      await navigator.clipboard.writeText(text);
      toast("클립보드에 복사했습니다.");
      return true;
    }catch(e){
      const out = $("#output");
      out.focus(); out.select();
      try{
        document.execCommand("copy");
        toast("복사했습니다. (호환 모드)");
        return true;
      }catch(_){
        toast("복사 실패: 직접 선택 후 복사하세요.");
        return false;
      }
    }
  }

  function bindDynamic(){
    const host = $("#works");

    host.addEventListener("click", (e) => {
      const workEl = e.target.closest(".work");
      if(!workEl) return;
      const workId = workEl.dataset.w;
      const w = state.works.find(x => x.id === workId);
      if(!w) return;

      if(e.target.closest(".js-delWork")){
        const idx = state.works.findIndex(x => x.id === workId);
        state.works.splice(idx, 1);
        if(state.works.length === 0) state.works.push(newWork());
        const today = todayISO();
        state.works.forEach(x => x.date = today);
        render();
        toast("작업을 삭제했습니다.");
        return;
      }

      if(e.target.closest(".js-addGroup")){
        addGroupToWork(workId);
        return;
      }

      const groupEl = e.target.closest(".group");
      if(groupEl){
        const gi = Number(groupEl.dataset.g);
        const g = (w.groups || [])[gi];
        if(!g) return;

        if(e.target.closest(".js-toggleDetail")){
          g.showDetail = !g.showDetail;
          saveLS();
          render();
          toast(g.showDetail ? "상세 입력을 열었습니다." : "상세 입력을 닫았습니다.");
          return;
        }

        if(e.target.closest(".js-delGroup")){
          w.groups.splice(gi, 1);
          ensureWorkHasAtLeastOneGroup(w);
          render();
          toast("구역을 삭제했습니다.");
          return;
        }

        if(e.target.closest(".js-addMatInGroup")){
          g.items = g.items || [];
          g.items.push(newMaterial());
          render();
          toast("자재를 추가했습니다.");
          return;
        }

        if(e.target.closest(".js-clearBulk")){
          g.bulk = "";
          g.bulkPreview = [];
          g.showPreview = false;
          saveLS();
          render();
          toast("대량 입력을 지웠습니다.");
          return;
        }

        // ✅ 빠른입력 적용 => items에 바로 넣지 않고, bulkPreview 생성 후 표시
        if(e.target.closest(".js-applyBulk")){
          const ta = groupEl.querySelector(".js-bulk");
          const bulk = (ta?.value || "").trim();
          if(!bulk){
            toast("대량 입력 내용이 없습니다.");
            return;
          }
          const lines = bulk.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
          if(lines.length === 0){
            toast("대량 입력 내용이 없습니다.");
            return;
          }

          const preview = [];
          let lastMaterialInput = "";

          for(const line of lines){
            const parsed = parseBulkLine(line);
            if(!parsed) continue;

            if(!parsed.materialInput && lastMaterialInput){
              parsed.materialInput = lastMaterialInput; // 상속
            }
            if(parsed.materialInput){
              lastMaterialInput = parsed.materialInput;
            }
            if(!parsed.materialInput) continue;

            preview.push({
              _raw: line,
              materialInput: parsed.materialInput,
              spec: parsed.spec,
              qty: parsed.qty,
              unit: parsed.unit || "EA",
              note: parsed.note || "",
            });
          }

          if(preview.length === 0){
            toast("인식 가능한 항목이 없습니다.");
            return;
          }

          g.bulk = bulk;
          g.bulkPreview = preview;
          g.showPreview = true;
          saveLS();
          render();
          toast(`미리보기 ${preview.length}건 생성`);
          return;
        }

        // ✅ 미리보기 삭제
        if(e.target.closest(".js-delPreview")){
          const card = e.target.closest(".previewCard");
          const pi = Number(card?.dataset.pi);
          if(Number.isNaN(pi)) return;
          g.bulkPreview.splice(pi, 1);
          if(g.bulkPreview.length === 0) g.showPreview = false;
          saveLS();
          render();
          toast("미리보기 항목을 삭제했습니다.");
          return;
        }

        // ✅ 미리보기 확정 => bulkPreview를 items로 반영
        if(e.target.closest(".js-commitPreview")){
          if(!Array.isArray(g.bulkPreview) || g.bulkPreview.length === 0){
            toast("확정할 미리보기가 없습니다.");
            return;
          }

          g.items = g.items || [];

          for(const p of g.bulkPreview){
            const it = newMaterial();
            it.materialInput = (p.materialInput||"").trim();
            it.spec = (p.spec||"").trim();
            it.qty = (p.qty||"").trim();
            it.unit = (p.unit||"EA").trim();
            it.note = (p.note||"").trim();

            const mapped = mapMaterial(it.materialInput);
            if(mapped.canonical){
              it.canonical = mapped.canonical;
              it.category = mapped.category || "OTHER";
            }else{
              it.canonical = (it.materialInput||"").toUpperCase();
              it.category = "OTHER";
            }

            g.items.push(it);
          }

          // 첫 빈행 제거
          if(g.items.length > 1){
            g.items = g.items.filter((x, idx) => {
              if(idx === 0){
                const empty = !x.materialInput && !x.spec && !x.qty && !x.note;
                return !empty;
              }
              return true;
            });
          }

          g.bulkPreview = [];
          g.showPreview = false;
          g.showDetail = true; // 확정 후 바로 상세 열어주는 게 수정하기 편함
          saveLS();
          render();
          toast("미리보기를 확정하여 상세 데이터에 반영했습니다.");
          return;
        }

        // ✅ 미리보기 취소
        if(e.target.closest(".js-cancelPreview")){
          g.bulkPreview = [];
          g.showPreview = false;
          saveLS();
          render();
          toast("미리보기를 취소했습니다.");
          return;
        }

        const itemEl = e.target.closest(".item");
        if(itemEl){
          const ii = Number(itemEl.dataset.i);
          const it = (g.items || [])[ii];
          if(!it) return;

          if(e.target.closest(".js-meta")){
            itemEl.classList.toggle("showMeta");
            return;
          }

          if(e.target.closest(".js-delItem")){
            g.items.splice(ii, 1);
            if(g.items.length === 0) g.items.push(newMaterial());
            render();
            toast("자재를 삭제했습니다.");
            return;
          }

          if(e.target.closest(".js-dup")){
            const copy = JSON.parse(JSON.stringify(it));
            g.items.splice(ii+1, 0, copy);
            render();
            toast("자재를 복제했습니다.");
            return;
          }

          if(e.target.closest(".js-auto")){
            it.lockAuto = false;
            const mapped = mapMaterial(it.materialInput);
            if(mapped.canonical){
              it.canonical = mapped.canonical;
              it.category = mapped.category || "OTHER";
            }
            render();
            toast("자동 제안을 적용했습니다.");
            return;
          }
        }
      }
    });

    // ✅ 미리보기 입력 반영(그룹 bulkPreview 배열 직접 업데이트)
    host.addEventListener("input", (e) => {
      const workEl = e.target.closest(".work");
      if(!workEl) return;
      const workId = workEl.dataset.w;
      const w = state.works.find(x => x.id === workId);
      if(!w) return;

      if(e.target.classList.contains("js-drawing")){
        w.drawing = e.target.value;
        saveLS();
        return;
      }
      if(e.target.classList.contains("js-date")){
        w.date = e.target.value;
        saveLS();
        return;
      }
      if(e.target.classList.contains("js-area")){
        w.area = e.target.value;
        pushUnique(w.history.areas, w.area, 150);
        saveLS();
        return;
      }
      if(e.target.classList.contains("js-memo")){
        w.memo = e.target.value;
        saveLS();
        return;
      }

      const groupEl = e.target.closest(".group");
      if(!groupEl) return;
      const gi = Number(groupEl.dataset.g);
      const g = (w.groups || [])[gi];
      if(!g) return;

      if(e.target.classList.contains("js-areaDetail")){
        g.areaDetail = e.target.value;
        saveLS();
        return;
      }

      if(e.target.classList.contains("js-bulk")){
        g.bulk = e.target.value;
        saveLS();
        return;
      }

      // 미리보기 카드 편집
      const pCard = e.target.closest(".previewCard");
      if(pCard){
        const pi = Number(pCard.dataset.pi);
        if(Number.isNaN(pi) || !g.bulkPreview?.[pi]) return;
        const p = g.bulkPreview[pi];

        if(e.target.classList.contains("js-p-mat"))  p.materialInput = e.target.value;
        if(e.target.classList.contains("js-p-spec")) p.spec = e.target.value;
        if(e.target.classList.contains("js-p-qty"))  p.qty = e.target.value;
        if(e.target.classList.contains("js-p-note")) p.note = e.target.value;

        saveLS();
        return;
      }

      // 상세 item 수정
      const itemEl = e.target.closest(".item");
      if(!itemEl) return;
      const ii = Number(itemEl.dataset.i);
      const it = (g.items || [])[ii];
      if(!it) return;

      if(e.target.classList.contains("js-mat")){
        it.materialInput = e.target.value;
        const mapped = mapMaterial(it.materialInput);

        const row = e.target.closest(".item");
        const canonInput = row?.querySelector(".js-canon");
        const catSelect  = row?.querySelector(".js-cat");
        const chipMap    = row?.querySelector(".js-chipMap");
        const chipLock   = row?.querySelector(".js-chipLock");

        if(!it.lockAuto){
          if(mapped.canonical){
            it.canonical = mapped.canonical;
            it.category  = mapped.category || "OTHER";
            if(canonInput) canonInput.value = it.canonical;
            if(catSelect)  catSelect.value  = it.category;
          }
        }

        if(chipMap)  chipMap.innerHTML  = `<b>매핑</b> ${esc(mapped.confidence || "-")}`;
        if(chipLock) chipLock.innerHTML = `<b>자동잠금</b> ${it.lockAuto ? "ON" : "OFF"}`;

        saveLS();
        return;
      }

      if(e.target.classList.contains("js-canon")){
        it.canonical = e.target.value;
        it.lockAuto = true;

        const row = e.target.closest(".item");
        const chipLock = row?.querySelector(".js-chipLock");
        if(chipLock) chipLock.innerHTML = `<b>자동잠금</b> ON`;

        saveLS();
        return;
      }

      if(e.target.classList.contains("js-spec")){
        it.spec = e.target.value;
        const row = e.target.closest(".item");
        const chipSpec = row?.querySelector(".js-chipSpec");
        const pretty = parseSpec(it.spec).pretty;
        if(chipSpec) chipSpec.innerHTML = `<b>규격</b> ${esc(pretty || "-")}`;
        saveLS();
        return;
      }

      if(e.target.classList.contains("js-qty")){
        it.qty = e.target.value;
        saveLS();
        return;
      }

      if(e.target.classList.contains("js-note")){
        it.note = e.target.value;
        saveLS();
        return;
      }
    });

    host.addEventListener("change", (e) => {
      const workEl = e.target.closest(".work");
      if(!workEl) return;
      const workId = workEl.dataset.w;
      const w = state.works.find(x => x.id === workId);
      if(!w) return;

      if(e.target.classList.contains("js-drawing")){
        pushUnique(w.history.drawings, w.drawing, 120);
        saveLS();
        render();
        return;
      }

      const groupEl = e.target.closest(".group");
      if(!groupEl) return;
      const gi = Number(groupEl.dataset.g);
      const g = (w.groups || [])[gi];
      if(!g) return;

      // 미리보기 unit 변경
      const pCard = e.target.closest(".previewCard");
      if(pCard){
        const pi = Number(pCard.dataset.pi);
        if(Number.isNaN(pi) || !g.bulkPreview?.[pi]) return;
        const p = g.bulkPreview[pi];
        if(e.target.classList.contains("js-p-unit")){
          p.unit = e.target.value;
          saveLS();
        }
        return;
      }

      // 상세 item unit/cat 변경
      const itemEl = e.target.closest(".item");
      if(!itemEl) return;

      const ii = Number(itemEl.dataset.i);
      const it = (g.items || [])[ii];
      if(!it) return;

      if(e.target.classList.contains("js-cat")){
        it.category = e.target.value;
        it.lockAuto = true;
        const row = e.target.closest(".item");
        const chipLock = row?.querySelector(".js-chipLock");
        if(chipLock) chipLock.innerHTML = `<b>자동잠금</b> ON`;
        saveLS();
        return;
      }

      if(e.target.classList.contains("js-unit")){
        it.unit = e.target.value;
        saveLS();
        return;
      }
    });
  }

  function bindStaticButtons(){
    $("#btnAddWork").addEventListener("click", addWork);

    $("#btnSaveAll").addEventListener("click", () => {
      saveLS();
      toast("저장했습니다. (이 기기 저장)");
    });

    $("#btnGenerateAll").addEventListener("click", () => {
      $("#output").value = generateOutputAllWorks();
      toast("전체 작업 결과를 생성했습니다.");
    });

    $("#btnCopy").addEventListener("click", async () => {
      const text = $("#output").value || generateOutputAllWorks();
      $("#output").value = text;
      await copyToClipboard(text);
    });

    $("#btnReset").addEventListener("click", () => {
      const ok = confirm("이 기기에 저장된 모든 데이터가 삭제됩니다. 계속할까요?");
      if(!ok) return;
      localStorage.removeItem(LS_KEY);
      location.reload();
    });
  }

  // Boot
  load();
  render();
  bindStaticButtons();
  bindDynamic();

  async function copyToClipboard(text){
    try{
      await navigator.clipboard.writeText(text);
      toast("클립보드에 복사했습니다.");
      return true;
    }catch(e){
      const out = $("#output");
      out.focus(); out.select();
      try{
        document.execCommand("copy");
        toast("복사했습니다. (호환 모드)");
        return true;
      }catch(_){
        toast("복사 실패: 직접 선택 후 복사하세요.");
        return false;
      }
    }
  }
})();
</script>
