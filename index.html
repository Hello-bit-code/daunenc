<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 물량/작업 보고</title>

  <style>
    :root{
      --bg:#0b1020;
      --surface: rgba(17, 24, 39, .86);
      --surface2: rgba(15, 23, 42, .72);
      --line: rgba(51, 65, 85, .62);
      --text:#e5e7eb;
      --muted: rgba(148, 163, 184, .92);
      --danger:#fb7185;
      --shadow: 0 20px 48px rgba(0,0,0,.42);
      --radius: 18px;
      --radius2: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
              "Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic", sans-serif;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      letter-spacing: -0.2px;
      background:
        radial-gradient(1200px 780px at 20% 10%, rgba(96,165,250,.18), transparent 55%),
        radial-gradient(900px 560px at 90% 20%, rgba(52,211,153,.12), transparent 55%),
        radial-gradient(900px 560px at 40% 95%, rgba(251,113,133,.10), transparent 60%),
        var(--bg);
    }
    .wrap{ max-width: 1120px; margin: 22px auto 80px; padding: 0 18px; }

    .topbar{ display:flex; gap:14px; align-items:flex-start; justify-content: space-between; margin-bottom: 14px; }
    .brand{ display:flex; gap:12px; align-items:center; }
    .logo{
      width:44px; height:44px; border-radius:16px;
      background: linear-gradient(135deg, rgba(96,165,250,.95), rgba(52,211,153,.86));
      box-shadow: 0 14px 34px rgba(96,165,250,.22);
      position: relative; flex:0 0 auto;
    }
    .logo:after{
      content:""; position:absolute; inset:10px; border-radius:12px;
      background: rgba(17,24,39,.86);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .title h1{ margin:0; font-size:18px; line-height:1.15; }
    .title .sub{ margin-top:5px; font-size:12.5px; color: var(--muted); line-height:1.35; white-space:pre-line; }

    .card{
      background: linear-gradient(180deg, var(--surface), var(--surface2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .card + .card{ margin-top:14px; }

    .cardHead{ display:flex; gap:12px; align-items:center; justify-content: space-between; margin-bottom:12px; }
    .cardHead .left{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .cardHead h2{ margin:0; font-size:14.5px; }

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding: 7px 10px; border-radius: 999px;
      border: 1px solid var(--line); background: rgba(11, 15, 26, .35);
      font-size: 12px; color: var(--muted); user-select:none; white-space:nowrap;
    }
    .pill strong{ color: var(--text); font-weight:700; }

    .grid{ display:grid; grid-template-columns: repeat(12, 1fr); gap: 12px; }
    .field label{ display:block; margin: 0 0 6px; font-size:12px; color: var(--muted); }
    input, select, textarea{
      width:100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(51,65,85,.85);
      background: rgba(11,15,26,.48);
      color: var(--text);
      outline:none;
      transition: border .15s ease, background .15s ease;
      font-size:14px;
    }
    input:focus, select:focus, textarea:focus{
      border-color: rgba(96,165,250,.85);
      background: rgba(11,15,26,.62);
    }
    input::placeholder{ color: rgba(148,163,184,.62); }

    textarea{
      min-height: 190px;
      resize: vertical;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.5;
      white-space: pre;
    }

    .hint{ font-size:12px; color: var(--muted); line-height:1.45; }
    .hr{ height:1px; background: rgba(51,65,85,.75); margin: 14px 0; }

    .btn{
      border: 1px solid rgba(51,65,85,.85);
      background: rgba(11,15,26,.50);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-size:13px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      white-space:nowrap;
      transition: border .15s ease, background .15s ease, transform .05s ease;
      touch-action: manipulation;
    }
    .btn:hover{ border-color: rgba(96,165,250,.55); background: rgba(11,15,26,.72); }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      border-color: transparent;
      background: linear-gradient(135deg, rgba(96,165,250,.98), rgba(52,211,153,.86));
      color:#07101d;
      font-weight: 800;
    }
    .btn.danger{ border-color: rgba(251,113,133,.55); }
    .btn.small{ padding: 8px 10px; border-radius: 10px; font-size: 12.5px; }
    .btn.ghost{
      background: transparent;
      border-color: rgba(51,65,85,.55);
    }
    .btn.ghost:hover{
      border-color: rgba(96,165,250,.45);
      background: rgba(11,15,26,.30);
    }

    .bar{ display:flex; gap:10px; flex-wrap: wrap; justify-content: space-between; align-items:center; }
    .barRight{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end; }

    .works{ display:flex; flex-direction: column; gap: 12px; }
    .work{
      border: 1px solid rgba(51,65,85,.75);
      border-radius: var(--radius);
      background: rgba(11,15,26,.30);
      padding: 12px;
      backdrop-filter: blur(8px);
    }
    .workHead{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .workHead .left{ display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
    .workTitle{ font-size: 13.5px; font-weight: 900; }
    .tag{
      font-size: 12px;
      color: var(--muted);
      border: 1px solid rgba(51,65,85,.65);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(17,24,39,.42);
    }

    .groups{ display:flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .group{
      border: 1px solid rgba(51,65,85,.70);
      border-radius: var(--radius2);
      background: rgba(11,15,26,.28);
      padding: 12px;
      backdrop-filter: blur(8px);
    }
    .groupHead{
      display:flex; align-items:center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .groupHead .left{ display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
    .groupTitle{ font-size: 13px; font-weight: 850; }

    .detailWrap{ display:none; margin-top: 10px; }
    .group.showDetail .detailWrap{ display:block; }

    .items{ display:flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .item{
      border: 1px solid rgba(51,65,85,.65);
      border-radius: var(--radius2);
      background: rgba(11,15,26,.34);
      padding: 10px;
      backdrop-filter: blur(8px);
    }
    .itemGrid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      align-items: end;
    }

    .chips{ display:none; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .item.showMeta .chips{ display:flex; }
    .chip{
      font-size: 12px; padding: 6px 10px; border-radius: 999px;
      border: 1px solid rgba(51,65,85,.70);
      background: rgba(17,24,39,.62);
      color: var(--muted);
    }
    .chip b{ color: var(--text); }

    .bulkList{ display:none; margin-top: 10px; }
    .group.showBulkList .bulkList{ display:block; }
    .previewCard{
      border: 1px solid rgba(51,65,85,.65);
      border-radius: var(--radius2);
      background: rgba(11,15,26,.30);
      padding: 10px;
    }
    .previewTop{
      display:flex; align-items:center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .kbadge{
      display:inline-flex;
      border: 1px solid rgba(51,65,85,.55);
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(17,24,39,.35);
      color: var(--muted);
      font-size: 12px;
    }

    .bulkTA{ min-height: 110px; font-family: var(--mono); font-size: 12.5px; line-height: 1.45; white-space: pre; }

    .toast{
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      background: rgba(17,24,39,.92);
      border: 1px solid rgba(51,65,85,.85);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      display:none;
      font-size: 13px;
      max-width: min(720px, calc(100% - 24px));
      z-index: 9999;
    }

    .watermark{
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 10px;
      display:flex;
      justify-content:center;
      pointer-events:none;
      z-index: 1;
      opacity: .55;
    }
    .watermark .wmCard{
      pointer-events:none;
      font-size: 11px;
      color: rgba(148,163,184,.9);
      border: 1px solid rgba(51,65,85,.55);
      background: rgba(11,15,26,.35);
      border-radius: 999px;
      padding: 7px 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      backdrop-filter: blur(6px);
      text-align:center;
      line-height: 1.25;
      white-space: pre-line;
    }

    @media (max-width: 820px){
      .wrap{ padding: 0 14px; }
      .topbar{ flex-direction: column; align-items:flex-start; }

      input, select, textarea{ font-size:16px; padding: 12px 12px; border-radius: 14px; }
      .btn{ padding: 12px 13px; font-size:14px; border-radius: 14px; }
      .btn.small{ padding: 10px 12px; font-size:13px; border-radius: 12px; }

      .grid{ grid-template-columns: 1fr 1fr; }
      .span12,.span6{ grid-column: 1 / -1 !important; }
      .span3{ grid-column: span 1 !important; }

      .itemGrid{ grid-template-columns: 1fr 1fr; }
      .full{ grid-column: 1 / -1 !important; }
      .half{ grid-column: span 1 !important; }
      .btnBar{ grid-column: 1 / -1 !important; justify-content:flex-end; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div class="title">
        <h1>오프라인 물량/작업 보고</h1>
        <div class="sub">서버 없이 사용 · 기기(LocalStorage) 저장
빠른입력: 한 줄=자재 1건(또는 규격×수량EA 세트 여러 개면 자동 분해)
자재명 안 쓰면 직전 자재명 자동 상속
예) 전선관 28c 10m
예) 36c 25m (직전 자재명 상속)</div>
      </div>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn danger" id="btnReset">초기화</button>
    </div>
  </div>

  <section class="card">
    <div class="cardHead">
      <div class="left">
        <h2>작업(기본 정보)</h2>
        <span class="pill"><strong id="countWorks">0</strong> 작업</span>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="btnAddWork">작업 추가</button>
        <button class="btn" id="btnSaveAll">저장</button>
      </div>
    </div>

    <div class="hint" style="margin-bottom:10px;">
      ✅ 기본은 <b>빠른입력</b>으로 넣고, 아래 리스트에서 바로 수정하세요.
    </div>

    <div class="works" id="works"></div>
  </section>

  <section class="card">
    <div class="cardHead">
      <div class="left">
        <h2>금일 작업 결과(카톡용)</h2>
        <span class="pill">전체 작업 출력</span>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="btnCopy">내용 복사</button>
      </div>
    </div>

    <textarea id="output" readonly placeholder="‘전체 작업 결과 생성’을 누르면 모든 작업이 한 번에 작성됩니다."></textarea>

    <div class="hr"></div>

    <div class="bar">
      <div class="hint">복사 후 카톡에 붙여넣기 하세요.</div>
      <div class="barRight">
        <button class="btn primary" id="btnGenerateAll">전체 작업 결과 생성</button>
      </div>
    </div>
  </section>
</div>

<div class="watermark" aria-hidden="true">
  <div class="wmCard">제작 : 황정운
수정요청 : 010-5031-9447</div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const UNIT_OPTIONS = ["EA","본","m","mm","SET","POINT","ROLL","PCS"];
  const DEFAULT_AREAS = ["PIPE RACK","전기실 1층","전기실 2층","SUBSTATION","UG","TK AREA","에틸렌 B구역"];

  const MATERIAL_DICT = [
    { aliases:["전선관","스틸 전선관","스틸파이프","스틸 파이프","STEEL PIPE","STEELPIPE","STEEL CONDUIT","STEEL CONDUIT PIPE","CONDUIT","CONDUIT PIPE"], canonical:"STEEL CONDUIT", category:"CONDUIT"},
    { aliases:["후렉시블","후렉쉬블","FLEX","FLEXIBLE","FLEXIBLE CONDUIT"], canonical:"FLEXIBLE CONDUIT", category:"CONDUIT"},
  ];

  const $ = (sel) => document.querySelector(sel);

  function toast(msg){
    const t = $("#toast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(toast._timer);
    toast._timer = setTimeout(()=> t.style.display = "none", 2200);
  }

  function todayISO(){
    const d = new Date();
    const tz = d.getTimezoneOffset() * 60000;
    return new Date(d.getTime() - tz).toISOString().slice(0,10);
  }

  function todayISOWithKoreanDay(){
    const d = new Date();
    const days = ["일","월","화","수","목","금","토"];
    return `${todayISO()} ${days[d.getDay()]}`;
  }

  function normalizeText(s){
    return (s||"").trim().replace(/\s+/g, " ").toUpperCase();
  }

  function esc(s){
    return String(s||"")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function mapMaterial(input){
    const raw = (input||"").trim();
    if(!raw) return { canonical:"", category:"", confidence:"" };

    const up = normalizeText(raw);
    const compact = up.replace(/[\s\-_/]/g, "");

    for(const entry of MATERIAL_DICT){
      for(const a of entry.aliases){
        const au = normalizeText(a);
        if(up === au) return { canonical: entry.canonical, category: entry.category, confidence:"정확" };
      }
    }
    for(const entry of MATERIAL_DICT){
      for(const a of entry.aliases){
        const au = normalizeText(a);
        if(au && up.includes(au)) return { canonical: entry.canonical, category: entry.category, confidence:"포함" };
      }
    }
    for(const entry of MATERIAL_DICT){
      for(const a of entry.aliases){
        const au = normalizeText(a).replace(/[\s\-_/]/g, "");
        if(au && compact.includes(au)) return { canonical: entry.canonical, category: entry.category, confidence:"유사" };
      }
    }
    return { canonical: raw.toUpperCase(), category:"OTHER", confidence:"원문" };
  }

  function parseSpec(spec){
    const s0 = (spec||"").trim();
    if(!s0) return { pretty:"" };
    return { pretty: s0 };
  }

  function qtyUnitForOutput(qty, unit){
    const q = (qty ?? "").toString().trim();
    const u0 = (unit ?? "").toString().trim();
    if(!q) return "";

    const n = Number(q);
    const isNum = !Number.isNaN(n);

    const u = u0.toLowerCase();

    if(u === "m"){
      if(!isNum) return `${q}${u0}`;
      return `${n * 1000}mm`;
    }
    if(u === "mm"){
      return isNum ? `${n}mm` : `${q}mm`;
    }
    return u0 ? `${q}${u0}` : q;
  }

  // ✅ FIX: 콤마/문장부호 제거 후 파싱 (10m, 같은 케이스 포함)
  function parseQtyUnitToken(token){
    const t0 = (token||"").trim().replace(/[,\u3001\u3002]/g,"");
    if(!t0) return null;

    const m = t0.match(/^(\d+(?:\.\d+)?)(EA|본|m|mm|MM|M|SET|POINT|ROLL|PCS|개|포인트)$/i);
    if(!m) return null;

    const qty = m[1];
    let u = m[2];

    const U = u.toUpperCase();
    let unit = u;

    if(U === "M") unit = "m";
    if(U === "MM") unit = "mm";
    if(u === "개") unit = "EA";
    if(u === "포인트") unit = "POINT";

    return { qty, unit };
  }

  // ✅ FIX: "36c 25m" 같은 라인을 spec-only로 인정(직전 자재명 상속)
  function isSpecOnlyLine(line){
    const s = (line||"").trim();
    if(!s) return false;

    const toks = s.split(/\s+/).filter(Boolean);
    if(toks.length === 0) return false;

    const specTok = toks[0];
    const specOk = /^\d+(?:\.\d+)?\s*[cC]$/.test(specTok) || /^\d+(?:\.\d+)?[cC]$/.test(specTok);
    if(!specOk) return false;

    if(toks.length === 1) return true;

    // 두 번째 토큰이 길이/수량이면 spec-only 인정
    const qu = parseQtyUnitToken(toks[1]);
    return !!qu;
  }

  function normalizeSpecUpper(spec){
    const s = (spec||"").trim();
    if(!s) return "";
    // 28c, 36c -> 28C, 36C
    if(/^\d+(?:\.\d+)?[cC]$/.test(s)) return s.toUpperCase();
    return s;
  }

  function parseBulkLineToItems(line, lastMaterialInput){
    const raw = (line||"").trim();
    if(!raw) return [];

    // spec-only: "36c 25m" / "36c"
    if(isSpecOnlyLine(raw) && lastMaterialInput){
      const toks = raw.split(/\s+/).filter(Boolean);
      const spec0 = normalizeSpecUpper(toks[0]);
      let qty = "", unit = "EA";
      if(toks[1]){
        const qu = parseQtyUnitToken(toks[1]);
        if(qu){
          qty = qu.qty;
          unit = qu.unit;
        }
      }
      return [{
        _raw: raw,
        materialInput: lastMaterialInput,
        spec: spec0,
        qty,
        unit,
        note: ""
      }];
    }

    let tokens = raw.replace(/\t+/g," ").split(/\s+/).filter(Boolean);

    // tail qty/unit 1개
    let qty = "", unit = "EA";
    const last = tokens[tokens.length-1];
    const qu = parseQtyUnitToken(last);
    if(qu){
      qty = qu.qty;
      unit = qu.unit;
      tokens.pop();
    }

    // spec 후보: 맨 뒤에서 1개 찾기 (28c, 36c)
    let spec = "";
    if(tokens.length){
      const cand = tokens[tokens.length-1];
      if(/^\d+(?:\.\d+)?[cC]$/.test(cand)){
        spec = normalizeSpecUpper(cand);
        tokens.pop();
      }
    }

    const materialInput = tokens.join(" ").trim();

    return [{
      _raw: raw,
      materialInput,
      spec,
      qty,
      unit,
      note: ""
    }];
  }

  const LS_KEY = "worklog_offline_v11_spec_inherit_fix";
  const state = { works: [] };

  function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }

  function newMaterial(){
    return { materialInput:"", canonical:"", category:"OTHER", spec:"", qty:"", unit:"EA", note:"", lockAuto:false };
  }
  function newGroup(){
    return { areaDetail:"", bulk:"", showDetail:false, showBulkList:false, bulkLinks:[], items:[ newMaterial() ] };
  }
  function newWork(){
    return {
      id: uid(),
      drawing: "",
      date: todayISO(),
      area: "",
      memo: "",
      history: { drawings: [], areas: DEFAULT_AREAS.slice() },
      groups: [ newGroup() ],
    };
  }

  function load(){
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      try{
        const data = JSON.parse(raw);
        if(data && Array.isArray(data.works)) state.works = data.works;
      }catch(e){}
    }
    if(state.works.length === 0) state.works.push(newWork());

    const today = todayISO();
    state.works.forEach(w => { w.date = today; });
    saveLS();
  }

  function saveLS(){
    localStorage.setItem(LS_KEY, JSON.stringify({ works: state.works }));
  }

  function updateCounts(){
    $("#countWorks").textContent = String(state.works.length);
  }

  function renderBulkListCards(g){
    const links = Array.isArray(g.bulkLinks) ? g.bulkLinks : [];
    const items = Array.isArray(g.items) ? g.items : [];
    const alive = links.filter(x => Number.isInteger(x.idx) && items[x.idx]);
    g.bulkLinks = alive;

    if(alive.length === 0){
      return `<div class="hint">적용된 항목이 없습니다.</div>`;
    }

    return alive.map((ln, pi) => {
      const it = items[ln.idx];
      return `
        <div class="previewCard" data-li="${pi}">
          <div class="previewTop">
            <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
              <span class="kbadge">#${pi+1}</span>
              <span class="kbadge" title="원문">${esc(ln.raw||"")}</span>
              <span class="kbadge" title="내부 인덱스">IDX:${ln.idx}</span>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <button class="btn small danger js-delBulkLinked" type="button">삭제</button>
            </div>
          </div>

          <div class="grid">
            <div class="field span6" style="grid-column: span 6;">
              <label>자재명</label>
              <input class="js-li-mat" data-idx="${ln.idx}" value="${esc(it.materialInput||"")}" />
            </div>

            <div class="field span3" style="grid-column: span 3;">
              <label>규격(Spec)</label>
              <input class="js-li-spec" data-idx="${ln.idx}" value="${esc(it.spec||"")}" />
            </div>

            <div class="field span2" style="grid-column: span 2;">
              <label>수량</label>
              <input class="js-li-qty" data-idx="${ln.idx}" value="${esc(it.qty||"")}" inputmode="decimal" />
            </div>

            <div class="field span1" style="grid-column: span 1;">
              <label>단위</label>
              <select class="js-li-unit" data-idx="${ln.idx}">
                ${UNIT_OPTIONS.map(u => `<option value="${u}" ${u===it.unit ? "selected":""}>${u}</option>`).join("")}
              </select>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function render(){
    const host = $("#works");
    host.innerHTML = "";

    state.works.forEach((w, wi) => {
      const workEl = document.createElement("div");
      workEl.className = "work";
      workEl.dataset.w = w.id;

      workEl.innerHTML = `
        <div class="workHead">
          <div class="left">
            <div class="workTitle">작업 ${wi+1}</div>
            <div class="tag">구역 ${(w.groups||[]).length}개</div>
          </div>
        </div>

        <div class="grid">
          <div class="field span6" style="grid-column: span 6;">
            <label>도면 Num.</label>
            <input class="js-drawing" value="${esc(w.drawing||"")}" />
          </div>

          <div class="field span3" style="grid-column: span 3;">
            <label>날짜</label>
            <input class="js-date" type="date" value="${esc(w.date||todayISO())}" />
          </div>

          <div class="field span3" style="grid-column: span 3;">
            <label>공정지역(Area)</label>
            <input class="js-area" value="${esc(w.area||"")}" />
          </div>
        </div>

        <div class="hr"></div>
        <div class="groups js-groups"></div>
      `;

      host.appendChild(workEl);

      const groupsHost = workEl.querySelector(".js-groups");
      (w.groups||[]).forEach((g, gi) => {
        const groupEl = document.createElement("div");
        groupEl.className = "group";
        groupEl.dataset.w = w.id;
        groupEl.dataset.g = String(gi);
        if(g.showBulkList) groupEl.classList.add("showBulkList");

        groupEl.innerHTML = `
          <div class="groupHead">
            <div class="left">
              <div class="groupTitle">구역 ${gi+1}</div>
              <div class="tag">자재 ${(g.items||[]).length}건</div>
            </div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <button class="btn small js-applyBulk" type="button">빠른입력 적용</button>
              <button class="btn small danger js-clearBulk" type="button">지우기</button>
            </div>
          </div>

          <div class="grid">
            <div class="field span12" style="grid-column: span 12;">
              <label>대량 입력</label>
              <textarea class="js-bulk bulkTA">${esc(g.bulk||"")}</textarea>
            </div>
          </div>

          <div class="bulkList">
            <div class="hr"></div>
            <div class="works" style="gap:10px;">
              ${renderBulkListCards(g)}
            </div>
          </div>
        `;

        groupsHost.appendChild(groupEl);
      });
    });

    updateCounts();
    saveLS();
  }

  function generateOutputAllWorks(){
    const out = [];
    out.push(todayISOWithKoreanDay());
    out.push("[금일 작업내용]");
    out.push("");

    state.works.forEach((w) => {
      out.push(`도면 : ${(w.drawing||"").trim()}`);
      const groups = Array.isArray(w.groups) ? w.groups : [];

      groups.forEach((g) => {
        let n = 1;
        const items = Array.isArray(g.items) ? g.items : [];
        items.forEach(it => {
          const mat = ((it.canonical || "").trim() || (it.materialInput || "").trim()).toUpperCase();
          const specPretty = parseSpec(it.spec).pretty;
          const qtyPart = qtyUnitForOutput(it.qty, it.unit);

          if(!mat && !specPretty && !qtyPart) return;

          const parts = [];
          parts.push(`${n})`);
          if(mat) parts.push(mat);
          if(specPretty) parts.push(specPretty);
          if(qtyPart) parts.push(qtyPart);

          out.push(parts.join(" ").replace(/\s+/g," ").trim());
          n++;
        });
      });
    });

    return out.join("\n").trim();
  }

  async function copyToClipboard(text){
    try{
      await navigator.clipboard.writeText(text);
      toast("클립보드에 복사했습니다.");
    }catch(e){
      const out = $("#output");
      out.focus(); out.select();
      try{
        document.execCommand("copy");
        toast("복사했습니다. (호환 모드)");
      }catch(_){
        toast("복사 실패: 직접 선택 후 복사하세요.");
      }
    }
  }

  function bindStaticButtons(){
    $("#btnAddWork").addEventListener("click", () => {
      state.works.push(newWork());
      render();
      toast("작업을 추가했습니다.");
    });

    $("#btnSaveAll").addEventListener("click", () => {
      saveLS();
      toast("저장했습니다.");
    });

    $("#btnGenerateAll").addEventListener("click", () => {
      $("#output").value = generateOutputAllWorks();
      toast("전체 작업 결과를 생성했습니다.");
    });

    $("#btnCopy").addEventListener("click", async () => {
      const text = $("#output").value || generateOutputAllWorks();
      $("#output").value = text;
      await copyToClipboard(text);
    });

    // ✅ FIX: 초기화 문구 완화 + “이 기기 저장” 명시
    $("#btnReset").addEventListener("click", () => {
      const ok = confirm("이 기기(브라우저)에 저장된 데이터가 초기화됩니다. 계속할까요?");
      if(!ok) return;
      localStorage.removeItem(LS_KEY);
      location.reload();
    });
  }

  function bindDynamic(){
    const host = $("#works");

    host.addEventListener("click", (e) => {
      const workEl = e.target.closest(".work");
      if(!workEl) return;
      const workId = workEl.dataset.w;
      const w = state.works.find(x => x.id === workId);
      if(!w) return;

      const groupEl = e.target.closest(".group");
      if(!groupEl) return;
      const gi = Number(groupEl.dataset.g);
      const g = (w.groups||[])[gi];
      if(!g) return;

      if(e.target.closest(".js-clearBulk")){
        g.bulk = "";
        g.bulkLinks = [];
        g.showBulkList = false;
        g.items = [newMaterial()];
        saveLS();
        render();
        toast("대량 입력을 지웠습니다.");
        return;
      }

      if(e.target.closest(".js-applyBulk")){
        const ta = groupEl.querySelector(".js-bulk");
        const bulk = (ta?.value || "").trim();
        if(!bulk){
          toast("대량 입력 내용이 없습니다.");
          return;
        }

        const lines = bulk.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
        g.items = [];
        g.bulkLinks = [];
        g.bulk = bulk;

        let lastMaterialInput = "";

        for(const line of lines){
          const parsedItems = parseBulkLineToItems(line, lastMaterialInput);
          if(!parsedItems.length) continue;

          for(const p of parsedItems){
            if(p.materialInput){
              lastMaterialInput = p.materialInput;
            }

            const it = newMaterial();
            it.materialInput = p.materialInput;
            it.spec = normalizeSpecUpper(p.spec);
            it.qty = p.qty;
            it.unit = p.unit || "EA";

            const mapped = mapMaterial(it.materialInput);
            if(mapped.canonical){
              it.canonical = mapped.canonical;
              it.category = mapped.category || "OTHER";
            }else{
              it.canonical = (it.materialInput||"").toUpperCase();
              it.category = "OTHER";
            }

            const idx = g.items.length;
            g.items.push(it);
            g.bulkLinks.push({ idx, raw: p._raw || line });
          }
        }

        g.showBulkList = true;
        saveLS();
        render();
        toast(`적용 완료: ${g.bulkLinks.length}건`);
        return;
      }

      if(e.target.closest(".js-delBulkLinked")){
        const card = e.target.closest(".previewCard");
        const li = Number(card?.dataset.li);
        if(Number.isNaN(li)) return;
        const link = g.bulkLinks?.[li];
        if(!link) return;

        g.items.splice(link.idx, 1);
        g.bulkLinks = (g.bulkLinks || [])
          .filter((x, i) => i !== li)
          .map(x => ({ ...x, idx: x.idx > link.idx ? x.idx - 1 : x.idx }));

        if(g.bulkLinks.length === 0) g.showBulkList = false;

        saveLS();
        render();
        toast("항목을 삭제했습니다.");
        return;
      }
    });

    host.addEventListener("input", (e) => {
      const workEl = e.target.closest(".work");
      if(!workEl) return;
      const workId = workEl.dataset.w;
      const w = state.works.find(x => x.id === workId);
      if(!w) return;

      if(e.target.classList.contains("js-drawing")){ w.drawing = e.target.value; saveLS(); return; }
      if(e.target.classList.contains("js-date")){ w.date = e.target.value; saveLS(); return; }
      if(e.target.classList.contains("js-area")){ w.area = e.target.value; saveLS(); return; }

      const groupEl = e.target.closest(".group");
      if(!groupEl) return;
      const gi = Number(groupEl.dataset.g);
      const g = (w.groups||[])[gi];
      if(!g) return;

      if(e.target.classList.contains("js-bulk")){ g.bulk = e.target.value; saveLS(); return; }

      const idxAttr = e.target.getAttribute("data-idx");
      if(idxAttr !== null){
        const idx = Number(idxAttr);
        const it = g.items?.[idx];
        if(!it) return;

        if(e.target.classList.contains("js-li-mat")){
          it.materialInput = e.target.value;
          const mapped = mapMaterial(it.materialInput);
          if(mapped.canonical){
            it.canonical = mapped.canonical;
            it.category  = mapped.category || "OTHER";
          }
          saveLS(); return;
        }
        if(e.target.classList.contains("js-li-spec")){ it.spec = normalizeSpecUpper(e.target.value); saveLS(); return; }
        if(e.target.classList.contains("js-li-qty")){ it.qty = e.target.value; saveLS(); return; }
      }
    });

    host.addEventListener("change", (e) => {
      const workEl = e.target.closest(".work");
      if(!workEl) return;
      const workId = workEl.dataset.w;
      const w = state.works.find(x => x.id === workId);
      if(!w) return;

      const groupEl = e.target.closest(".group");
      if(!groupEl) return;
      const gi = Number(groupEl.dataset.g);
      const g = (w.groups||[])[gi];
      if(!g) return;

      const idxAttr = e.target.getAttribute("data-idx");
      if(idxAttr !== null && e.target.classList.contains("js-li-unit")){
        const idx = Number(idxAttr);
        const it = g.items?.[idx];
        if(!it) return;
        it.unit = e.target.value;
        saveLS();
      }
    });
  }

  load();
  render();
  bindStaticButtons();
  bindDynamic();
})();
</script>
</body>
</html>
